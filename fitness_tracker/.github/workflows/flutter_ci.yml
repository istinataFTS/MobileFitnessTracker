name: Flutter CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
      - refactor/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    name: Format, Analyze, Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fitness_tracker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test
